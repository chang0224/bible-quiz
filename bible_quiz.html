<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인애 1기 성경암송 퀴즈</title>
<meta name="theme-color" content="#ffffff" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="icon" type="image/svg+xml" href="./in-ae-icon.svg" />
<link rel="apple-touch-icon" href="./in-ae-icon.svg" />
<link rel="manifest" href="./site.webmanifest" />
<style>
  :root {
    --bg: #f5f1ea;
    --paper: #ffffff;
    --ink: #2a2a2a;
    --accent: #6b4f2a;
    --accent-soft: #c8a36a;
    --good: #2f8f4d;
    --bad: #c14545;
    --muted: #888;
    --border: #d8d2c5;
    --shadow: 0 4px 20px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }
  header.topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  header h1 { margin: 0; font-size: 20px; color: var(--accent); }
  header .home-btn {
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px;
  }
  header .home-btn:hover { background: var(--accent); color: white; }

  .home-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px; margin-top: 24px;
  }
  .home-card {
    background: var(--paper); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; cursor: pointer; transition: all .15s ease; text-align: center;
    box-shadow: var(--shadow);
  }
  .home-card:hover { transform: translateY(-2px); border-color: var(--accent-soft); }
  .home-card .icon { font-size: 36px; display:block; margin-bottom: 8px; }
  .home-card .label { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
  .home-card .desc { font-size: 12px; color: var(--muted); }

  .home-title {
    text-align: center; margin: 32px 0 16px;
  }
  .home-title h2 { font-size: 28px; margin: 0 0 8px; color: var(--accent); }
  .home-title p { color: var(--muted); margin: 0; font-size: 14px; }

  /* common card */
  .card {
    background: var(--paper); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px; box-shadow: var(--shadow);
  }
  .progress-bar {
    height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-bar > div { background: var(--accent); height: 100%; transition: width .3s; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--muted); margin-bottom: 12px;
  }
  .topic { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .ref { font-size: 24px; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
  .first-word {
    font-size: 18px; color: var(--muted); margin-bottom: 18px;
    background: #faf6ee; padding: 10px 14px; border-radius: 8px; border-left: 3px solid var(--accent-soft);
  }
  .first-word strong { color: var(--accent); margin-right: 6px; font-size: 13px; }

  textarea, input[type="text"] {
    width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
    font-family: inherit; font-size: 16px; line-height: 1.6; resize: vertical;
    background: #fdfcfa;
  }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: var(--accent-soft); }
  textarea { min-height: 120px; }

  .actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  button.btn {
    background: var(--accent); color: white; border: none; padding: 10px 20px;
    border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600;
    transition: background .15s;
  }
  button.btn:hover { background: #553e1e; }
  button.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  button.btn.secondary:hover { background: #faf6ee; color: var(--accent); }
  button.btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  button.btn.ghost:hover { background: #faf6ee; color: var(--ink); }

  .feedback { margin-top: 16px; padding: 14px; border-radius: 8px; font-size: 14px; line-height: 1.7; }
  .feedback.correct { background: #ecf7ee; border-left: 3px solid var(--good); }
  .feedback.wrong { background: #fbecec; border-left: 3px solid var(--bad); }
  .feedback .label { font-weight: 700; margin-bottom: 6px; display: block; }
  .feedback .answer { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
  .feedback .answer-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }

  .diff .ok { color: var(--ink); }
  .diff .miss { background: #fde2e2; color: var(--bad); border-radius: 3px; padding: 0 2px; text-decoration: underline; }

  /* book list */
  .book-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }
  .book-row {
    display: grid; grid-template-columns: 30px 1fr auto; gap: 6px; align-items: center;
  }
  .book-row .num { color: var(--muted); font-size: 13px; text-align: right; }
  .book-row .mark { font-size: 13px; white-space: nowrap; }
  .book-row .mark.ok { color: var(--good); }
  .book-row .mark.ng { color: var(--bad); font-weight: 600; }
  .book-row input { padding: 6px 8px; font-size: 14px; min-width: 0; }
  .book-row input.ok { border-color: var(--good); background: #ecf7ee; }
  .book-row input.ng { border-color: var(--bad); background: #fbecec; }

  .mnemonic {
    background: linear-gradient(145deg, #fff8ed 0%, #faecd0 100%);
    border: 1px solid var(--accent-soft); border-radius: 12px;
    padding: 16px 18px; margin: 14px 0; font-size: 14.5px;
  }
  .mnemonic h4 { margin: 0 0 8px; color: var(--accent); font-size: 15px; }
  .mnemonic .testament { margin-top: 10px; }
  .mnemonic .testament > b { color: var(--accent); font-size: 14px; }
  .mnemonic .line { margin: 4px 0 4px 6px; line-height: 1.85; }
  .mnemonic .line .label { color: var(--muted); font-size: 12px; margin-right: 6px; }
  .col-title { font-size: 16px; font-weight: 700; color: var(--accent); margin: 16px 0 8px; }
  .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 720px) { .two-cols { grid-template-columns: 1fr; } }

  /* helm */
  .helm-wrap { display: flex; flex-direction: column; align-items: center; }
  .helm { position: relative; width: 100%; max-width: 560px; aspect-ratio: 1/1; }
  .helm svg { width: 100%; height: 100%; display: block; }
  .helm input.cell {
    position: absolute; transform: translate(-50%, -50%);
    width: 84px; padding: 4px 6px; font-size: 13px; text-align: center;
    border: 1px solid var(--border); border-radius: 6px; background: #ffffffd9;
  }
  .helm input.cell.center { width: 78px; font-weight: 700; }
  .helm input.cell.half { width: 110px; font-weight: 600; }
  .helm input.cell.outer { width: 130px; font-weight: 600; }
  .helm input.cell.ok { border-color: var(--good); background: #ecf7eecc; }
  .helm input.cell.ng { border-color: var(--bad); background: #fbececdd; }

  /* result */
  .score-big { font-size: 56px; font-weight: 800; color: var(--accent); text-align: center; margin: 12px 0 4px; }
  .score-sub { text-align: center; color: var(--muted); margin-bottom: 16px; }
  .review-list { display: grid; gap: 10px; margin-top: 14px; }
  .review-item {
    border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px;
    background: #fafafa;
  }
  .review-item.wrong { border-left: 4px solid var(--bad); }
  .review-item.right { border-left: 4px solid var(--good); }
  .review-item .ref { font-size: 14px; margin-bottom: 4px; font-weight: 700; }
  .review-item .your { font-size: 13px; color: var(--muted); }
  .review-item .ans { font-size: 13px; }

  /* edit */
  .edit-row {
    border: 1px solid var(--border); border-radius: 10px; padding: 14px;
    margin-bottom: 12px; background: #fafafa;
  }
  .edit-row .h {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .edit-row .ref { font-weight: 700; font-size: 15px; }
  .edit-row .topic { font-size: 11px; }
  .edit-row textarea { background: #fff; min-height: 80px; font-size: 14px; }

  /* 플래시카드 */
  .flash-stage { perspective: 1400px; margin: 8px 0 18px; }
  .flash-card {
    position: relative; width: 100%; min-height: 300px;
    transform-style: preserve-3d; transition: transform .55s cubic-bezier(.6,.05,.28,.91);
    cursor: pointer;
  }
  .flash-card.flipped { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 14px; padding: 28px 24px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; border: 1px solid var(--border);
  }
  .flash-front { background: linear-gradient(145deg, #fdfaf2 0%, #f5ecd6 100%); }
  .flash-back  { background: linear-gradient(145deg, #fff 0%, #faf6ee 100%); transform: rotateY(180deg); }
  .flash-face .topic { font-size: 13px; color: var(--accent); letter-spacing: 1px; margin-bottom: 10px; }
  .flash-face .ref { font-size: 32px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
  .flash-face .hint {
    font-size: 18px; color: var(--muted); padding: 10px 16px;
    background: #ffffffaa; border-radius: 8px; border-left: 3px solid var(--accent-soft);
  }
  .flash-face .body {
    font-size: 18px; line-height: 1.85; color: var(--ink); margin-top: 4px;
    max-width: 100%; word-break: keep-all;
  }
  .flash-face .tip { position:absolute; bottom:14px; right:18px; font-size:11px; color:var(--muted); }
  .flash-face .badge {
    position: absolute; top: 12px; left: 14px; font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 30px; letter-spacing: 0.5px;
  }
  .flash-face .badge.mem { background: #d3edd9; color: var(--good); }
  .flash-face .badge.notmem { background: #fae0e0; color: var(--bad); }
  .mem-buttons { display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .mem-buttons .btn-mem {
    flex: 1; min-width: 140px; padding: 12px 18px; border-radius: 10px; border: 2px solid;
    font-weight: 700; font-size: 15px; cursor: pointer; transition: all .15s;
  }
  .mem-buttons .btn-mem.yes { background: #ecf7ee; color: var(--good); border-color: var(--good); }
  .mem-buttons .btn-mem.yes:hover { background: var(--good); color: #fff; }
  .mem-buttons .btn-mem.no { background: #fbecec; color: var(--bad); border-color: var(--bad); }
  .mem-buttons .btn-mem.no:hover { background: var(--bad); color: #fff; }
  .mem-buttons .btn-mem.active { box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
  .flash-stats {
    background: #faf6ee; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px;
    font-size: 13px; display: flex; justify-content: space-between; gap: 8px;
  }
  .flash-stats b { color: var(--accent); }
  .flash-nav {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    margin-top: 8px; flex-wrap: wrap;
  }
  .flash-nav .center { display:flex; gap:8px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; padding: 10px 18px; border-radius: 30px;
    font-size: 14px; opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  .toast.show { opacity: .92; }

  .options-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .options-row label { font-size: 13px; }
  .options-row select, .options-row input[type=checkbox] { margin-right: 6px; }

  .legend { font-size: 12px; color: var(--muted); margin-top: 6px; }
  hr.sep { border: 0; border-top: 1px dashed var(--border); margin: 18px 0; }
</style>
</head>
<body>
<div class="container">
  <header class="topbar">
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="home-btn" id="back-btn" style="display:none">← 뒤로</button>
      <h1>인애 1기 지도자반 성경암송</h1>
    </div>
    <button class="home-btn" id="home-btn">홈</button>
  </header>
  <main id="content"></main>
</div>
<div id="toast" class="toast"></div>

<script>
"use strict";

// ===== 데이터 =====
const DEFAULT_VERSES = [
  // 1페이지

  { id:'v02', page:1, topic:'구원의 확신', ref:'요 5:24', firstWord:'내가 진실로',

  { id:'v04', page:1, topic:'하나님의 속성', ref:'시 36:5-6', firstWord:'여호와여 주의',

  { id:'v05', page:1, topic:'성경', ref:'딤후 3:16', firstWord:'모든',

  { id:'v06', page:1, topic:'성경', ref:'벧전 2:2', firstWord:'갓난',

  { id:'v07', page:1, topic:'기도', ref:'요 15:7', firstWord:'너희가',

  { id:'v17', page:2, topic:'순종하는 삶', ref:'롬 12:1', firstWord:'그러므로',

const STORE_KEY = 'mybible_quiz_v1';
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveStore(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
function getVerses() {
  const s = loadStore();
  if (s.verses && Array.isArray(s.verses) && s.verses.length === DEFAULT_VERSES.length) return s.verses;
  return DEFAULT_VERSES.map(v => ({...v}));
}
function setVerses(arr) {
  const s = loadStore();
  s.verses = arr;
  saveStore(s);
}
function resetVerses() {
  const s = loadStore();
  delete s.verses;
  saveStore(s);
}

// ===== 데이터 마이그레이션 =====
const SCHEMA_VERSION = 3;
(function migrate() {
  const s = loadStore();
  if ((s.schema|0) < 2) {
    if (s.wrong && Array.isArray(s.wrong.helm)) s.wrong.helm = [];
    s.schema = 2;
  }
  if ((s.schema|0) < 3) {
    // 66권/키그림 오답 추적 제거 — 오답 복습은 구절 전용
    if (s.wrong) { s.wrong.books = []; s.wrong.helm = []; }
    s.schema = 3;
  }
  saveStore(s);
})();

// ===== 외움 표시 (플래시카드) =====
function getMemorized() {
  const s = loadStore();
  return Array.isArray(s.memorized) ? s.memorized : [];
}
function setMemorizedList(arr) { const s = loadStore(); s.memorized = arr; saveStore(s); }
function isMemorized(id) { return getMemorized().includes(id); }
function markMemorized(id, val) {
  const arr = getMemorized();
  const idx = arr.indexOf(id);
  if (val && idx === -1) arr.push(id);
  if (!val && idx !== -1) arr.splice(idx, 1);
  setMemorizedList(arr);
}
function clearMemorized() { setMemorizedList([]); }

// ===== 오답노트 (누적 저장) =====
function getWrong() {
  const s = loadStore();
  const w = s.wrong || {};
  return {
    verses: Array.isArray(w.verses) ? w.verses : [],   // [verseId]
    books:  Array.isArray(w.books)  ? w.books  : [],   // [{side:'ot'|'nt', i:Number}]
    helm:   Array.isArray(w.helm)   ? w.helm   : [],   // [key]
  };
}
function saveWrong(w) { const s = loadStore(); s.wrong = w; saveStore(s); }
function addWrongVerse(id) {
  const w = getWrong();
  if (!w.verses.includes(id)) w.verses.push(id);
  saveWrong(w);
}
function removeWrongVerse(id) {
  const w = getWrong();
  w.verses = w.verses.filter(x => x !== id);
  saveWrong(w);
}
function setWrongBooks(side, indices) {
  // 해당 side의 오답을 indices로 교체
  const w = getWrong();
  w.books = w.books.filter(b => b.side !== side);
  indices.forEach(i => w.books.push({ side, i }));
  saveWrong(w);
}
function mergeWrongBooks(side, wrongIdx, rightIdx) {
  const w = getWrong();
  // 맞춘 것은 제거
  w.books = w.books.filter(b => !(b.side===side && rightIdx.includes(b.i)));
  // 틀린 것은 추가
  wrongIdx.forEach(i => {
    if (!w.books.some(b => b.side===side && b.i===i)) w.books.push({ side, i });
  });
  saveWrong(w);
}
function setWrongHelm(wrongKeys, rightKeys) {
  const w = getWrong();
  w.helm = w.helm.filter(k => !rightKeys.includes(k));
  wrongKeys.forEach(k => { if (!w.helm.includes(k)) w.helm.push(k); });
  saveWrong(w);
}
function clearWrong(kind) {
  const w = getWrong();
  if (!kind || kind==='all') { w.verses=[]; w.books=[]; w.helm=[]; }
  else if (kind==='verses') w.verses=[];
  else if (kind==='books') w.books=[];
  else if (kind==='helm') w.helm=[];
  saveWrong(w);
}

// 글자/숫자는 보존하고 띄어쓰기, 쉼표 등 구분자·구두점·기호만 무시
function normalize(str) {
  if (!str) return '';
  return String(str).normalize('NFC').replace(/[^\p{L}\p{N}]/gu, '');
}
function isCorrect(input, answer) {
  return normalize(input) === normalize(answer);
}
function isBookCorrect(input, answer) {
  const n = normalize(input);
  if (!n) return false;
  if (n === normalize(answer)) return true;
  const aliases = BOOK_ALIASES[answer] || [];
  return aliases.some(a => normalize(a) === n);
}

// 채점 시 차이 표시 (한글 단위 비교)
function diffHtml(input, answer) {
  // 단어 단위로 정렬 후 한글만 비교
  const a = normalize(input);
  const b = normalize(answer);
  // LCS 기반 마킹은 복잡하므로 간단히 인덱스 비교
  let html = '';
  const max = Math.max(a.length, b.length);
  // answer 기준으로 표시: 입력에 같은 위치 글자가 일치하면 ok, 아니면 miss
  for (let i = 0; i < b.length; i++) {
    const ch = b[i];
    if (a[i] === ch) html += `<span class="ok">${ch}</span>`;
    else html += `<span class="miss">${ch}</span>`;
  }
  return html;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(()=>t.classList.remove('show'), 1800);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let verseQuizState = null;
function startVerseQuiz(pool) {
  verseQuizState = { pool, idx:0, results: [] };

}
function renderVerseCard() {
  setBack(renderVerseSetup);
  const st = verseQuizState;
  const v = st.pool[st.idx];
  const total = st.pool.length;
  const pct = Math.round((st.idx) / total * 100);
  root.innerHTML = `
    <div class="card">
      <div class="progress-bar"><div style="width:${pct}%"></div></div>
      <div class="meta"><span>${st.idx+1} / ${total}</span><span class="topic">${v.topic}</span></div>
      <div class="ref">${v.ref}</div>
      <div class="first-word"><strong>시작 단어</strong>${v.firstWord}</div>
      <textarea id="ans" placeholder="여기에 구절을 이어서 입력하세요..." autofocus></textarea>
      <div class="actions">
        <button class="btn" id="check">확인</button>
        <button class="btn secondary" id="show">정답 보기 (모름)</button>
        <button class="btn ghost" id="skip">건너뛰기</button>
      </div>
      <div id="fb"></div>
    </div>
  `;
  const ans = document.getElementById('ans');
  ans.focus();
  ans.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey||e.ctrlKey)) { e.preventDefault(); doCheck(); }
  });
  document.getElementById('check').addEventListener('click', doCheck);
  document.getElementById('show').addEventListener('click', () => doReveal());
  document.getElementById('skip').addEventListener('click', () => recordAndNext({ skipped:true, input:'' }));

  function doCheck() {
    const input = ans.value;
    const correct = isCorrect(input, v.text);
    const fb = document.getElementById('fb');
    fb.innerHTML = `
      <div class="feedback ${correct?'correct':'wrong'}">
        <span class="label">${correct?'✓ 정답입니다!':'✗ 다시 확인해보세요'}</span>
        <div class="diff">${diffHtml(input, v.text)}</div>
        <div class="answer">
          <div class="answer-label">정답 (${v.ref})</div>
          <div>${v.text}</div>
        </div>
        <div class="actions" style="margin-top:10px">
          <button class="btn" id="next">다음 ▶</button>
        </div>
      </div>
    `;
    document.getElementById('next').addEventListener('click', () => recordAndNext({ correct, input }));
    document.getElementById('next').focus();
  }
  function doReveal() {
    const fb = document.getElementById('fb');
    fb.innerHTML = `
      <div class="feedback wrong">
        <span class="label">정답</span>
        <div>${v.text}</div>
        <div class="actions" style="margin-top:10px">
          <button class="btn" id="next">다음 ▶</button>
        </div>

    st.results.push({ verse: v, ...rec });
    // 오답노트 갱신
    if (rec.correct) removeWrongVerse(v.id);
    else addWrongVerse(v.id);
    st.idx += 1;
    if (st.idx >= st.pool.length) renderVerseResult();
    else renderVerseCard();
  }
}

function gradeBooks(showOT, showNT) {

// ====== 키 그림 ======
function renderHelm() {
  setBack(renderHome);
  // SVG 키 그림 + 입력 필드 절대좌표
  const cx=300, cy=300;
  const rOuter=270, rRim=235, rRing=185, rHub=95, rCenter=55;
  function arcPath(r1, r2, a1, a2) {
    // 도넛 부채꼴
    const toRad = a => (a*Math.PI)/180;
    const x1 = cx + r2*Math.cos(toRad(a1)), y1 = cy + r2*Math.sin(toRad(a1));
    const x2 = cx + r2*Math.cos(toRad(a2)), y2 = cy + r2*Math.sin(toRad(a2));
    const x3 = cx + r1*Math.cos(toRad(a2)), y3 = cy + r1*Math.sin(toRad(a2));
    const x4 = cx + r1*Math.cos(toRad(a1)), y4 = cy + r1*Math.sin(toRad(a1));
    const large = (a2-a1) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r2} ${r2} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${r1} ${r1} 0 ${large} 0 ${x4} ${y4} Z`;
  }
  // 8 손잡이
  let handles = '';
  const handleAngles = [270, 315, 0, 45, 90, 135, 180, 225]; // 시계 방향
  handleAngles.forEach(a => {
    const rad = a*Math.PI/180;
    const hx = cx + (rOuter+18)*Math.cos(rad);
    const hy = cy + (rOuter+18)*Math.sin(rad);
    handles += `<ellipse cx="${hx}" cy="${hy}" rx="14" ry="22" transform="rotate(${a+90} ${hx} ${hy})" fill="#fff" stroke="#6b4f2a" stroke-width="2"/>`;
  });
  // 8조각 ring
  let segs = '';
  HELM.segments.forEach(s => {
    const a1 = s.angle - 22.5, a2 = s.angle + 22.5;
    segs += `<path d="${arcPath(rHub, rRing, a1, a2)}" fill="#fff" stroke="#6b4f2a" stroke-width="1.5"/>`;
  });
  // 안쪽 반원 (위/아래)
  const topHalf = `<path d="M ${cx-rHub} ${cy} A ${rHub} ${rHub} 0 0 1 ${cx+rHub} ${cy} L ${cx+rCenter} ${cy} A ${rCenter} ${rCenter} 0 0 0 ${cx-rCenter} ${cy} Z" fill="#fff" stroke="#6b4f2a" stroke-width="1.5"/>`;
  const bottomHalf = `<path d="M ${cx-rHub} ${cy} A ${rHub} ${rHub} 0 0 0 ${cx+rHub} ${cy} L ${cx+rCenter} ${cy} A ${rCenter} ${rCenter} 0 0 1 ${cx-rCenter} ${cy} Z" fill="#fff" stroke="#6b4f2a" stroke-width="1.5"/>`;

  const svg = `
    <svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <!-- 키 외곽 림 -->
      <circle cx="${cx}" cy="${cy}" r="${rOuter}" fill="none" stroke="#6b4f2a" stroke-width="3"/>
      <circle cx="${cx}" cy="${cy}" r="${rRim}" fill="none" stroke="#6b4f2a" stroke-width="2"/>
      ${handles}
      <!-- 8 조각 -->
      ${segs}
      <!-- 안쪽 반원 -->
      ${topHalf}${bottomHalf}
      <!-- 중앙 -->
      <circle cx="${cx}" cy="${cy}" r="${rCenter}" fill="#fff" stroke="#6b4f2a" stroke-width="2"/>
    </svg>
  `;

  // 입력 필드 위치 계산 (절대 % 좌표)
  function pctFromAngle(angle, radius) {
    const rad = angle*Math.PI/180;
    const x = cx + radius*Math.cos(rad);
    const y = cy + radius*Math.sin(rad);
    return { left: (x/600*100)+'%', top: (y/600*100)+'%' };
  }
  // 8 segment 위치 (반지름 평균)
  const rSeg = (rHub + rRing)/2;
  const segInputs = HELM.segments.map((s,i) => {
    const p = pctFromAngle(s.angle, rSeg);
    return `<input class="cell" data-key="${s.key}" type="text" placeholder="?" style="left:${p.left};top:${p.top}" />`;
  }).join('');
  // 안쪽 반원 (위/아래): 중심에서 위/아래로 (rHub+rCenter)/2
  const halfR = (rHub + rCenter)/2;
  const topPos = pctFromAngle(270, halfR);
  const botPos = pctFromAngle(90, halfR);
  const halfInputs = `
    <input class="cell half" data-key="innerTop" type="text" placeholder="위 반원" style="left:${topPos.left};top:${topPos.top}" />
    <input class="cell half" data-key="innerBottom" type="text" placeholder="아래 반원" style="left:${botPos.left};top:${botPos.top}" />
  `;
  const center = pctFromAngle(0, 0);
  const centerInput = `<input class="cell center" data-key="center" type="text" placeholder="중심" style="left:${center.left};top:${center.top}" />`;

  // 외곽 림 (위/아래 텍스트)
  const outerR = (rOuter + rRim)/2;
  const oTop = pctFromAngle(270, outerR);
  const oBot = pctFromAngle(90, outerR);
  const outerInputs = `
    <input class="cell outer" data-key="outerTop" type="text" placeholder="림 (위)" style="left:${oTop.left};top:${oTop.top}" />
    <input class="cell outer" data-key="outerBottom" type="text" placeholder="림 (아래)" style="left:${oBot.left};top:${oBot.top}" />
  `;

  root.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0;color:var(--accent)">일대일 키 그림</h2>
      <div class="legend">12개 영역(중심 1 + 안쪽 반원 위/아래 2 + 8조각 + 외곽 림 위/아래 2)을 채우세요. 띄어쓰기·구두점은 무시하지만 글자는 모두 정확히 입력해야 합니다.</div>
      <div class="helm-wrap">
        <div class="helm">
          ${svg}
          ${centerInput}
          ${halfInputs}
          ${segInputs}
          ${outerInputs}
        </div>
      </div>
      <div class="actions" style="justify-content:center">
        <button class="btn" id="grade">채점</button>
        <button class="btn secondary" id="reset">초기화</button>
        <button class="btn ghost" onclick="renderHome()">홈</button>
      </div>
      <div id="fb"></div>
    </div>
  `;
  document.getElementById('grade').addEventListener('click', gradeHelm);
  document.getElementById('reset').addEventListener('click', () => renderHelm());
}
function gradeHelm() {
  const cells = root.querySelectorAll('.helm input.cell');
  let total=0, correct=0;
  const wrong=[];
  const wrongKeys=[], rightKeys=[];
  function check(input, ans, label) {
    total++;
    input.classList.remove('ok','ng');
    const ok = matchHelm(input.value, ans);
    const k = input.dataset.key;
    if (ok) { correct++; input.classList.add('ok'); rightKeys.push(k); }
    else { input.classList.add('ng'); wrong.push({label, ans, your: input.value, key:k}); wrongKeys.push(k); }
  }
  cells.forEach(c => {
    const k = c.dataset.key;
    if (k==='center') check(c, HELM.center, '중심');
    else if (k==='innerTop') check(c, HELM.innerTop, '안쪽(위)');
    else if (k==='innerBottom') check(c, HELM.innerBottom, '안쪽(아래)');
    else if (k==='outerTop') check(c, HELM.outerTop, '림(위)');
    else if (k==='outerBottom') check(c, HELM.outerBottom, '림(아래)');
    else {
      const seg = HELM.segments.find(s=>s.key===k);
      if (seg) check(c, seg.label, '조각:'+seg.label);
    }
  });
  const fb = document.getElementById('fb');
  const wrongHtml = wrong.length ? `
    <div class="review-list" style="margin-top:12px">
      ${wrong.map(w=>`<div class="review-item wrong">
        <div class="ref">${w.label} — 정답: ${w.ans}</div>
        <div class="your"><b>입력:</b> ${w.your ? escapeHtml(w.your) : '<i>(미입력)</i>'}</div>
      </div>`).join('')}
    </div>` : '';
  fb.innerHTML = `
    <div class="feedback ${correct===total?'correct':'wrong'}">
      <span class="label">결과: ${correct} / ${total} (정답률 ${Math.round(correct/total*100)}%)</span>
      ${wrongHtml}
    </div>`;
}
// 키 그림 채점은 띄어쓰기·구두점만 무시하고 모든 글자가 일치해야 함
function matchHelm(input, answer) {
  const a = normalize(input), b = normalize(answer);
  if (!a) return false;
  return a === b;
}

            <div class="your"><b>입력:</b> ${w.your ? escapeHtml(w.your) : '<i>(미입력)</i>'}</div>
          </div>`).join('')}
      </div>` : '<div class="legend" style="margin-top:8px">모두 정답입니다. 오답 목록에서 제거되었습니다.</div>';
    fb.innerHTML = `
      <div class="feedback ${correct===total?'correct':'wrong'}">
        <span class="label">결과: ${correct} / ${total} (정답률 ${Math.round(correct/total*100)}%)</span>
        ${wrongHtml}
      </div>`;
    fb.scrollIntoView({behavior:'smooth', block:'start'});
  });
}

// ====== 플래시카드 ======
function renderFlashSetup() {
  setBack(renderHome);
  const all = getVerses();
  const mem = getMemorized();
  const memCount = all.filter(v => mem.includes(v.id)).length;
  const notMemCount = all.length - memCount;
  root.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0;color:var(--accent)">🃏 구절 플래시카드</h2>
      <div class="legend">앞면에 주제·성구장절·시작 단어가, 뒷면에 본문이 표시됩니다. 각 카드에서 <b>외움 / 아직</b>을 표시할 수 있습니다.</div>
      <div class="flash-stats" style="margin-top:12px">
        <span>전체 <b>${all.length}</b>구절</span>
        <span>외움 <b style="color:var(--good)">${memCount}</b></span>
        <span>외우지 못함 <b style="color:var(--bad)">${notMemCount}</b></span>
      </div>
      <div class="options-row" style="margin-top:14px">
        <label>범위
          <select id="opt-range">
            <option value="all">전체 (${all.length}구절)</option>
            <option value="notmem">외우지 못한 것만 (${notMemCount})</option>
            <option value="mem">외운 것만 (${memCount})</option>
            <option value="1">1페이지 (10구절)</option>
            <option value="2">2페이지 (10구절)</option>
            <option value="wrong">오답 구절만</option>
          </select>
        </label>
        <label>순서
          <select id="opt-order">
            <option value="seq">순서대로</option>
            <option value="rand">랜덤</option>
          </select>
        </label>
        <label>시작 면
          <select id="opt-side">
            <option value="front">앞면(힌트)부터</option>
            <option value="back">뒷면(본문)부터</option>
          </select>
        </label>
      </div>
      <div class="actions">
        <button class="btn" id="start">시작</button>
        <button class="btn ghost" id="reset-mem">외움 표시 전체 초기화</button>
        <button class="btn ghost" id="cancel">취소</button>
      </div>
      <div class="legend" style="margin-top:10px">조작: 카드 클릭(또는 스페이스) = 뒤집기 / ← → = 이전·다음 / 1·2 = 외움/아직</div>
    </div>
  `;
  document.getElementById('cancel').addEventListener('click', renderHome);
  document.getElementById('reset-mem').addEventListener('click', () => {
    if (confirm('모든 외움 표시를 초기화합니다. 진행할까요?')) { clearMemorized(); renderFlashSetup(); toast('초기화되었습니다'); }
  });
  document.getElementById('start').addEventListener('click', () => {
    const range = document.getElementById('opt-range').value;
    const order = document.getElementById('opt-order').value;
    const side  = document.getElementById('opt-side').value;
    const memSet = new Set(getMemorized());
    let pool;
    if (range==='wrong') {
      const w = getWrong();
      pool = w.verses.map(id => all.find(v=>v.id===id)).filter(Boolean);
    } else if (range==='notmem') pool = all.filter(v => !memSet.has(v.id));
    else if (range==='mem') pool = all.filter(v => memSet.has(v.id));
    else if (range==='all') pool = all.slice();
    else pool = all.filter(v=>v.page===Number(range));
    if (!pool.length) { toast('표시할 구절이 없습니다'); return; }
    if (order==='rand') pool = shuffle(pool);
    startFlash(pool, side);
  });
}

let flashState = null;
function startFlash(pool, startSide) {
  flashState = { pool, idx:0, flipped: startSide==='back', startSide };
  renderFlashCard();
}
function renderFlashCard() {
  setBack(renderFlashSetup);
  const st = flashState;
  const v = st.pool[st.idx];
  const total = st.pool.length;
  const pct = Math.round((st.idx+1)/total*100);
  const memorized = isMemorized(v.id);
  // pool 내 외움/미외움 통계
  const memSet = new Set(getMemorized());
  const memInPool = st.pool.filter(p => memSet.has(p.id)).length;
  const badge = memorized
    ? '<div class="badge mem">✓ 외움</div>'
    : '<div class="badge notmem">✗ 아직</div>';
  root.innerHTML = `
    <div class="card">
      <div class="progress-bar"><div style="width:${pct}%"></div></div>
      <div class="flash-stats">
        <span>${st.idx+1} / ${total}</span>
        <span>외움 <b style="color:var(--good)">${memInPool}</b> · 아직 <b style="color:var(--bad)">${total-memInPool}</b></span>
        <span class="topic">${escapeHtml(v.topic)}</span>
      </div>
      <div class="flash-stage">
        <div class="flash-card ${st.flipped?'flipped':''}" id="fcard">
          <div class="flash-face flash-front">
            ${badge}
            <div class="topic">${escapeHtml(v.topic)}</div>
            <div class="ref">${escapeHtml(v.ref)}</div>
            <div class="hint"><b style="color:var(--accent);font-size:13px;margin-right:6px">시작</b>${escapeHtml(v.firstWord)}</div>
            <div class="tip">탭/클릭하여 뒤집기</div>
          </div>
          <div class="flash-face flash-back">
            ${badge}
            <div class="topic">${escapeHtml(v.topic)} · ${escapeHtml(v.ref)}</div>
            <div class="body">${escapeHtml(v.text)}</div>
            <div class="tip">탭/클릭하여 뒤집기</div>
          </div>
        </div>
      </div>
      <div class="mem-buttons">
        <button class="btn-mem no ${!memorized?'active':''}" id="mark-no">✗ 아직 외우지 못함</button>
        <button class="btn-mem yes ${memorized?'active':''}" id="mark-yes">✓ 외움</button>
      </div>
      <div class="flash-nav" style="margin-top:14px">
        <button class="btn ghost" id="prev" ${st.idx===0?'disabled':''}>◀ 이전</button>
        <div class="center">
          <button class="btn secondary" id="flip">${st.flipped?'앞면 보기':'뒷면 보기'}</button>
          <button class="btn ghost" id="shuffle">랜덤 섞기</button>
        </div>
        <button class="btn" id="next" ${st.idx===total-1?'disabled':''}>다음 ▶</button>
      </div>
    </div>
  `;
  const card = document.getElementById('fcard');
  card.addEventListener('click', () => { st.flipped = !st.flipped; card.classList.toggle('flipped'); updateFlipBtn(); });
  document.getElementById('flip').addEventListener('click', (e) => { e.stopPropagation(); st.flipped = !st.flipped; card.classList.toggle('flipped'); updateFlipBtn(); });
  document.getElementById('prev').addEventListener('click', () => goPrev());
  document.getElementById('next').addEventListener('click', () => goNext());
  document.getElementById('shuffle').addEventListener('click', () => { st.pool = shuffle(st.pool); st.idx = 0; st.flipped = st.startSide==='back'; renderFlashCard(); });
  document.getElementById('mark-yes').addEventListener('click', () => { markMemorized(v.id, true); toast('✓ 외움'); afterMark(); });
  document.getElementById('mark-no').addEventListener('click', () => { markMemorized(v.id, false); toast('✗ 아직'); afterMark(); });

  function updateFlipBtn() {
    const fb = document.getElementById('flip');
    if (fb) fb.textContent = st.flipped?'앞면 보기':'뒷면 보기';
  }
  function goPrev() { if (st.idx>0) { st.idx--; st.flipped = st.startSide==='back'; renderFlashCard(); } }
  function goNext() {
    if (st.idx<total-1) { st.idx++; st.flipped = st.startSide==='back'; renderFlashCard(); }
    else { renderFlashSummary(); }
  }
  function afterMark() {
    if (st.idx<total-1) goNext();
    else renderFlashSummary();
  }
  // 키보드 조작
  if (window.__flashKey) document.removeEventListener('keydown', window.__flashKey);
  window.__flashKey = (e) => {
    if (!flashState) return;
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT') return;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      flashState.flipped = !flashState.flipped;
      const c = document.getElementById('fcard');
      if (c) c.classList.toggle('flipped');
      const fb = document.getElementById('flip');
      if (fb) fb.textContent = flashState.flipped?'앞면 보기':'뒷면 보기';
    } else if (e.key === 'ArrowLeft') goPrev();
    else if (e.key === 'ArrowRight') goNext();
    else if (e.key === '1') { markMemorized(v.id, true); toast('✓ 외움'); afterMark(); }
    else if (e.key === '2') { markMemorized(v.id, false); toast('✗ 아직'); afterMark(); }
  };
  document.addEventListener('keydown', window.__flashKey);
}

function renderFlashSummary() {
  setBack(renderFlashSetup);
  const st = flashState;
  const memSet = new Set(getMemorized());
  const memList = st.pool.filter(p => memSet.has(p.id));
  const notMemList = st.pool.filter(p => !memSet.has(p.id));
  root.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0;color:var(--accent);text-align:center">🃏 플래시카드 결과</h2>
      <div class="score-big">${memList.length} / ${st.pool.length}</div>
      <div class="score-sub">외운 구절 ${Math.round(memList.length/st.pool.length*100)}%</div>
      <div class="actions" style="justify-content:center">
        <button class="btn" id="retry-not" ${notMemList.length===0?'disabled':''}>외우지 못한 ${notMemList.length}구절만 다시</button>
        <button class="btn secondary" onclick="renderFlashSetup()">설정으로</button>
        <button class="btn ghost" onclick="renderHome()">홈</button>
      </div>
      <hr class="sep" />
      <h3 style="margin:0 0 8px;color:var(--bad)">아직 외우지 못한 구절 (${notMemList.length})</h3>
      ${notMemList.length === 0 ? '<div class="legend">없음 — 모두 외우셨어요!</div>' : `
        <div class="review-list">
          ${notMemList.map(v => `
            <div class="review-item wrong">
              <div class="ref">${v.ref} <span style="font-weight:400;font-size:12px;color:var(--muted)">— ${v.topic}</span></div>
              <div class="ans">${escapeHtml(v.text)}</div>
            </div>`).join('')}
        </div>`}
      <hr class="sep" />
      <h3 style="margin:0 0 8px;color:var(--good)">외운 구절 (${memList.length})</h3>
      ${memList.length === 0 ? '<div class="legend">없음</div>' : `
        <div class="review-list">
          ${memList.map(v => `
            <div class="review-item right">
              <div class="ref">✓ ${v.ref} <span style="font-weight:400;font-size:12px;color:var(--muted)">— ${v.topic}</span></div>
            </div>`).join('')}
        </div>`}
    </div>
  `;
  if (notMemList.length) {
    document.getElementById('retry-not').addEventListener('click', () => {
      startFlash(notMemList.slice(), st.startSide);
    });
  }
}

// ===== 시작 =====
renderHome();
</script>
</body>
</html>
